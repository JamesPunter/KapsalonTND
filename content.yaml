      dames:
        - title: Haar & styling
          items:
            - service: Dames knippen
              price: "€30"
            - service: Vlechten (dames & heren)
              price: v.a. €40
            - service: Föhnen (alle modellen)
              price: v.a. €30
            - service: Haarstyling & kapsels
              price: v.a. €50
