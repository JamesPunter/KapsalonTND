              price: €45 / €55
            - service: Medical Hard — 30 min / 1 uur
              price: €45 / €65
            - service: Speciaal Royal — 1 uur
              price: "€85"
            - service: Hoofdmassage
              price: "€15"
      heren:
        - title: Haar & baard
