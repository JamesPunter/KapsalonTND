# =============================================================
# KAPSALON TND — WEBSITE INHOUD
# =============================================================
# Bewerk dit bestand om de website aan te passen.
# Na elke wijziging: klik "Commit changes" op GitHub.
# De website wordt daarna automatisch bijgewerkt (~1 minuut).
#
# AFBEELDINGEN TOEVOEGEN:
#   1. Open de map public/images/[locatie]/ op GitHub.
#   2. Klik "Add file" → "Upload files" en sleep uw afbeelding erin.
#   3. Klik "Commit changes".
#   4. Vul hieronder het pad in, bijv:  images/amsterdam-oost/mijnfoto.jpg
#   Of gebruik een externe URL, bijv: https://mijnsite.nl/foto.jpg
# =============================================================

# -------------------------------------------------------------
# ALGEMEEN
# -------------------------------------------------------------
site:
  # Instagram-link in de navigatie en footer
  instagram: "https://www.instagram.com/kapsalon_tnd/"


# -------------------------------------------------------------
# STARTPAGINA — gallerij
# -------------------------------------------------------------
# Voeg afbeeldingen toe of verwijder ze door regels toe te voegen/verwijderen.
# src: lokaal pad (in public/images/) of volledige URL
# alt: beschrijving van de foto (voor toegankelijkheid)
home:
  gallery:
    - src: images/home/hero-banner.jpeg
      alt: Kapsalon TND banner met salonbranding en modellen.
    - src: images/home/style-1.jpeg
      alt: Close-up kapselresultaat bij Kapsalon TND.
    - src: images/home/image1.jpeg
      alt: Ruim interieur van Kapsalon TND met kappersstations en warme verlichting.
    - src: images/home/style-2.jpeg
      alt: Haarstylingsresultaat gefotografeerd in de salon.
    - src: images/home/image2.jpeg
      alt: Saloninterieur richting de ingang met moderne verlichting.
    - src: images/home/style-3.jpeg
      alt: Team en klant bij een gouden kappersstoel in de Kapsalon TND salon.
    - src: images/home/image3.jpeg
      alt: Werkplek Kapsalon TND met stylingsstations en salonbranding.


# -------------------------------------------------------------
# LOCATIES
# -------------------------------------------------------------
# Elke locatie heeft: contactgegevens, hero-afbeelding,
# galerij, carousel, highlights en een prijslijst.
# -------------------------------------------------------------

locations:

  # ===========================================================
  # AMSTERDAM - OOST (Molukkenstraat)
  # ===========================================================
  amsterdam-oost:
    name: Amsterdam - Oost
    # Adres dat op de pagina en in Google Maps wordt gebruikt
    address: "Molukkenstraat 35H, 1095 AT Amsterdam"
    # Telefoonnummer zoals weergegeven op de website
    phone: "+31 622288480"
    # WhatsApp-nummer (alleen cijfers, geen +, geen spaties)
    whatsapp: "31622288480"
    # Korte beschrijving van de locatie (zichtbaar op de locatiepagina)
    summary: Uw beschrijving hier
    # Grote afbeelding bovenaan de locatiepagina
    heroImage: images/amsterdam-oost/oostinterior.jpeg

    # Galerij op de locatiepagina (thumbnail-rij)
    gallery:
      - src: images/amsterdam-oost/oostinterior.jpeg
        alt: Interieur van Kapsalon TND Amsterdam - Oost.

    # Kenmerken / bulletpoints op de locatiepagina
    highlights:
      - Knippen voor dames en heren
      - Waxen, epileren en gezichtsverzorging
      - Keratine, verven en styling

    # Carousel met foto's en video's (slider)
    # kind: image → gebruik src + alt
    # kind: video → gebruik src + description
    # src mag een lokaal pad zijn (images/...) of een volledige URL
    carousel:
      - kind: video
        src: "https://kapsalontnd.nl/wp-content/uploads/2023/05/WhatsApp-Video-2023-05-15-at-13.35.01.mp4"
        description: Impressie van de salon op de Amsterdam-pagina van Kapsalon TND.
      - kind: image
        src: "https://kapsalontnd.nl/wp-content/uploads/2023/05/WhatsApp-Image-2023-05-15-at-13.12.58.jpeg"
        alt: Kapsalon TND Amsterdam - Oost.
      - kind: image
        src: "https://kapsalontnd.nl/wp-content/uploads/2023/05/WhatsApp-Image-2023-05-15-at-13.09.58-533x1024.jpeg"
        alt: Kapsalon TND Amsterdam - Oost.
      - kind: image
        src: "https://kapsalontnd.nl/wp-content/uploads/2023/05/WhatsApp-Image-2023-05-15-at-13.09.59-783x1024.jpeg"
        alt: Kapsalon TND Amsterdam - Oost.
      - kind: image
        src: "https://kapsalontnd.nl/wp-content/uploads/2023/05/WhatsApp-Image-2023-05-15-at-13.09.59-1-481x1024.jpeg"
        alt: Kapsalon TND Amsterdam - Oost.
      - kind: image
        src: "https://kapsalontnd.nl/wp-content/uploads/2022/06/WhatsApp-Image-2022-06-13-at-6.23.01-PM.jpeg"
        alt: Kapsalon TND Amsterdam - Oost.

    # ---------------------------------------------------------
    # PRIJZEN AMSTERDAM - OOST
    # Pas prijzen aan door de "price" waarden te wijzigen.
    # Voeg een dienst toe door een nieuwe - service / price toe te voegen.
    # ---------------------------------------------------------
